<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7SH7RA7 | Home</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" type="text/css" href="stylesheet.css">
    
</head>
<body>
<!--Cabeçalho principal-->
    <header class="header-global">
        <div class="logo"> 
            <a href="index.html">
                <img src="assets/logo.png" alt="Logotipo AshTray"> <!-- DEFINIR E COLOCAR LOGO-->
            </a>
        </div>
        <nav class="menu-categorias">
            <ul>
                <li><a href="#">Catálogo</a></li>
                <li><a href="#">Lançamentos</a></li>
                <li><a href="#">Promoções</a></li>
            </ul>
        </nav>

        <div class="acoes-usuario">
                <input type="search" id="busca-input" placeholder="Estou procurando...">
                <a href="login.html" class="bot-login">Entrar / Cadastrar</a>
                <button id="bot-abrir-carrinho" class="bot-carrinho" aria-label="Abrir Carrinho">
                    <i class="ph ph-shopping-cart"></i> <!--Icone de carrinho--> 
                </button>
        </div>
    </header>

<!--Carrinho Lateral-->
    <aside id="carrinho-lateral" class="carrinho-lateral">
        <div class="carrinho-header">
            <h2>Seu Carrinho</h2>
            <button id="bot-fechar-carrinho" class="bot-fechar-carrinho" aria-label="Fechar Carrinho">
                <i class="ph ph-x"></i> <!--Icone de X-->
            </button>

        </div>
        <div class="carrinho-conteudo">
            <p>O carrinho está vazio.</p>
        </div>
    </aside>
<!--Conteudo Principal-->
    
    <main class="corpo">
        <section class="carrossel-banners">
            <div class="carrossel-trilha" id="trilha-banners">
                <a href="pagina-poster01.html" class="banner-slide">
                    <img src="assets/poster01.jpg" alt="poster01" onerror="this.onerror=null; this.src='assets/placeholder.jpg';">
                </a>
                <a href="pagina-poster02.html" class="banner-slide">
                    <img src="assets/poster02.jpg" alt="poster02" onerror="this.onerror=null; this.src='assets/placeholder.jpg';">
                </a>
                <a href="pagina-poster02.html" class="banner-slide">
                    <img src="assets/poster02.jpg" alt="poster02" onerror="this.onerror=null; this.src='assets/placeholder.jpg';">
                </a>                                
            </div>
            <button class="bot-carrossel" id="bot-anterior"><i class="ph ph-caret-left"></i></button>
            <button class="bot-carrossel" id="bot-proximo"><i class="ph ph-caret-right"></i></button>
        </section>
        
        <section class="vitrine-promocao">
            <h2>Promoções</h2>
            <div class="grid-produtos">
                    
            </div>
        </section>

        <section class="vitrine-mais-vendidos">
            <h2>Mais Vendidos</h2>
            <div class="grid-produtos">

            </div>
        </section>
        <div class="acoes-vitrine">
                <button class="ver-mais">Clique para ver todos os produtos</button>
        </div>
    </main>
<!--Rodapé Principal-->
    <footer class="footer-global">
        <ul>
            <li>ashtray777@contato.com</li>
            <li>0800-777-777</li>
        </ul>
        <p>&copy; 2026 ASHTRAY 777 - Todos os direitos reservados</p>
    </footer>

    <script src="script.js"></script>

    <!-- Template para produto -->
    <template id="template-cartao-produto">
        <div class="cartao-produto">
            <img src="" alt="" class="produto-img">
            <div class="info-produto">
                <h3 class="titulo-produto"></h3>
                <p class="preco-produto"></p>
                <button class="bot-comprar" data-id="">
                    <i class="ph ph-bag"></i> Adicionar
                </button>
            </div>
        </div>
    </template>
    
    <!--Pop-up de Produto-->
    <div id="modal-produto" class="modal-overlay">
    <div class="modal-conteudo">
        <button id="bot-fechar-modal" class="bot-fechar-carrinho" aria-label="Fechar Modal">
            <i class="ph ph-x"></i>
        </button>

        <div class="modal-galeria">
            <button class="bot-galeria" id="modal-bot-anterior"><i class="ph ph-caret-left"></i></button>
            <img id="modal-img-principal" src="" alt="Imagem do Produto">
            <button class="bot-galeria" id="modal-bot-proximo"><i class="ph ph-caret-right"></i></button>
        </div>

        <div class="modal-info">
            <h2 id="modal-titulo"></h2>
            <p id="modal-preco" class="preco-destaque"></p>
            <p id="modal-parcelamento" class="preco-parcelado"></p>
            
            <div class="modal-opcoes">
                <p><strong>Tamanhos:</strong> <span id="modal-tamanhos"></span></p>
                <p><strong>Cores:</strong> <span id="modal-cores"></span></p>
            </div>

            <button id="modal-bot-comprar" class="bot-comprar" data-id="">
                <i class="ph ph-bag"></i> Adicionar ao Carrinho
            </button>
        </div>
    </div>
</div>
</body>
</html>
